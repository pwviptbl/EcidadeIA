<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agente e-Cidade Inteligente</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark">AF</div>
        <div>
          <strong>Agente e-Cidade</strong>
          <span>read-only</span>
        </div>
      </div>

      <button class="new-chat" id="newChatBtn" type="button">Nova conversa</button>

      <nav class="conversation-list" id="conversationList" aria-label="Conversas"></nav>
    </aside>

    <main class="chat-panel">
      <header class="topbar">
        <button class="icon-button mobile-only" id="menuBtn" type="button" aria-label="Abrir conversas">☰</button>
        <div>
          <h1>Analise</h1>
          <p id="statusText">Conectando ao e-Cidade...</p>
        </div>
      </header>

      <section class="messages" id="messages"></section>

      <section class="composer">
        <div class="quick-actions">
          <button type="button" data-prompt="IPTU tabelas campos descricoes e relacionamentos">Catalogo IPTU</button>
          <button type="button" data-prompt="Compare o IPTU 2025 e 2026 e explique os principais fatores de aumento">Comparar 2025 x 2026</button>
          <button type="button" data-prompt="health">Status API</button>
        </div>
        <form id="chatForm">
          <textarea id="messageInput" rows="2" placeholder="Digite uma pergunta"></textarea>
          <button id="sendBtn" type="submit">Enviar</button>
        </form>
      </section>
    </main>
  </div>

  <div class="modal-backdrop" id="deleteDialog" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="deleteDialogTitle">
      <h2 id="deleteDialogTitle">Excluir conversa?</h2>
      <p id="deleteDialogText">Esta conversa sera removida do historico local.</p>
      <div class="modal-actions">
        <button class="secondary-button" id="cancelDeleteBtn" type="button">Cancelar</button>
        <button class="danger-button" id="confirmDeleteBtn" type="button">Excluir</button>
      </div>
    </div>
  </div>

  <script>
    window.INITIAL_CONVERSATION_ID = "{{ conversation_id }}";
  </script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
